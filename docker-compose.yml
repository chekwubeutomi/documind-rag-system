version: '3.8'

services:
  # FastAPI Application
  api:
    build: .
    container_name: docmind-api
    ports:
      - "8000:8000"  # FastAPI
      - "8001:8001"  # Prometheus metrics
    environment:
      - DEBUG=False
      - LOG_LEVEL=INFO
      - VECTOR_DB_URL=http://qdrant:6333
      - VECTOR_DB_TYPE=qdrant
      - EMBEDDING_MODEL=all-MiniLM-L6-v2
      - LLM_PROVIDER=groq
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GROQ_MODEL=mixtral-8x7b-32768
      - ENABLE_PROMETHEUS=True
    depends_on:
      - qdrant
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - docmind-network
    restart: unless-stopped

  # Vector Database - Qdrant
  qdrant:
    image: qdrant/qdrant:v2.4.0
    container_name: docmind-qdrant
    ports:
      - "6333:6333"  # REST API
      - "6334:6334"  # gRPC API
    environment:
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - docmind-network
    restart: unless-stopped

  # Streamlit Frontend
  frontend:
    image: python:3.11-slim
    container_name: docmind-frontend
    working_dir: /app
    ports:
      - "8501:8501"
    command: bash -c "pip install streamlit requests && streamlit run frontend/streamlit_app.py"
    volumes:
      - .:/app
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    depends_on:
      - api
    networks:
      - docmind-network
    restart: unless-stopped

  # Prometheus for Monitoring (Optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: docmind-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    depends_on:
      - api
    networks:
      - docmind-network
    restart: unless-stopped

  # Grafana for Dashboards (Optional)
  grafana:
    image: grafana/grafana:latest
    container_name: docmind-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
    volumes:
      - ./data/grafana:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - docmind-network
    restart: unless-stopped

networks:
  docmind-network:
    driver: bridge
